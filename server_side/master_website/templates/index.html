<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Manager</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header>
      <h1><span>📺</span> TV Manager</h1>
      <div class="flex items-center gap-4">
        <nav class="hidden md:flex items-center gap-1 text-sm">
          <a href="#tvsSection">
            <img
              src="/static/televisoes.png"
              alt="Televisões"
              class="nav-icon"
            />
            Televisões
          </a>
          <a href="#mediaSection">
            <img src="/static/ficheiros.png" alt="Ficheiros" class="nav-icon" />
            Ficheiros
          </a>
          <a href="#playlistsSection">
            <img src="/static/playlists.png" alt="Playlists" class="nav-icon" />
            Playlists
          </a>
          <a href="#scheduleSection">
            <img
              src="/static/agendamentos.png"
              alt="Agendamentos"
              class="nav-icon"
            />
            Agendamentos
          </a>
        </nav>
        <div class="user-info">
          <div class="user-avatar"><span id="userInitial">A</span></div>
          <span id="userName" class="user-name">Admin</span>
          <button id="logoutBtn" class="logout-btn" title="Sair">🚪</button>
        </div>
      </div>
    </header>

    <!-- BARRA DE ESTATÍSTICAS (Dashboard) -->
    <div id="dashboardBar" class="dashboard-bar">
      <div id="dashboardContainer" class="dashboard-stats">
        <!-- Carregado via JS -->
      </div>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-10 space-y-12">
      <section id="tvsSection" class="scroll-mt-24">
        <div class="section-title">
          <img
            src="/static/televisoes.png"
            alt="Televisões"
            class="section-icon"
          />
          Televisões
        </div>
        <div id="tvsContainer">Carregando...</div>
      </section>

      <section id="mediaSection" class="scroll-mt-24">
        <div class="section-title">
          <img
            src="/static/ficheiros.png"
            alt="Ficheiros"
            class="section-icon"
          />
          Ficheiros
        </div>
        <div id="mediaContainer">Carregando...</div>
      </section>

      <section id="playlistsSection" class="scroll-mt-24">
        <div class="section-title">
          <img
            src="/static/playlists.png"
            alt="Playlists"
            class="section-icon"
          />
          Playlists
        </div>
        <div id="playlistsContainer">Carregando...</div>
      </section>

      <section id="scheduleSection" class="scroll-mt-24">
        <div class="section-title">
          <img
            src="/static/agendamentos.png"
            alt="Agendamentos"
            class="section-icon"
          />
          Agendamentos
        </div>
        <div id="scheduleContainer">Carregando...</div>
      </section>
    </main>

    <!-- MODAL -->
    <div id="customModal" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modalTitle">Adicionar</h3>
          <button id="closeModalBtn" class="modal-close">✖</button>
        </div>
        <div id="modalBody"></div>
        <div class="modal-footer">
          <button id="modalCancelBtn" class="btn btn-ghost">Cancelar</button>
          <button id="modalConfirmBtn" class="btn btn-primary">
            Confirmar
          </button>
        </div>
      </div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox">
      <button id="closeLightbox" class="lightbox-close">✖</button>
      <img id="lightboxImage" src="" alt="Visualização" style="display: none" />
      <div id="lightboxVideoContainer" style="display: none"></div>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
