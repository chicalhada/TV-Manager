<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-gray-200">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 shadow-lg flex flex-col border-r border-gray-800">
            <div class="p-5 border-b border-gray-800">
                <h1 class="text-xl font-bold text-white flex items-center gap-2">
                    <span class="text-indigo-400">📺</span> TV Manager
                </h1>
            </div>
            <nav class="flex-1 px-3 py-4 space-y-1">
                <a href="#" data-view="dashboard" class="nav-item flex items-center px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition sidebar-active text-indigo-400 bg-gray-800">
                    <i class="fas fa-th-large w-5 text-center"></i>
                    <span class="ml-3 text-sm font-medium">Dashboard</span>
                </a>
                <a href="#" data-view="tvs" class="nav-item flex items-center px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition">
                    <i class="fas fa-tv w-5 text-center"></i>
                    <span class="ml-3 text-sm font-medium">Televisões</span>
                </a>
                <a href="#" data-view="media" class="nav-item flex items-center px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition">
                    <i class="fas fa-image w-5 text-center"></i>
                    <span class="ml-3 text-sm font-medium">Ficheiros</span>
                </a>
                <a href="#" data-view="playlists" class="nav-item flex items-center px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition">
                    <i class="fas fa-list-ul w-5 text-center"></i>
                    <span class="ml-3 text-sm font-medium">Playlists</span>
                </a>
                <a href="#" data-view="schedule" class="nav-item flex items-center px-4 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 transition">
                    <i class="fas fa-calendar-alt w-5 text-center"></i>
                    <span class="ml-3 text-sm font-medium">Agendamentos</span>
                </a>
            </nav>
            <div class="p-4 border-t border-gray-800">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-indigo-900 flex items-center justify-center text-indigo-300 font-semibold text-sm">
                            <span id="userInitial">A</span>
                        </div>
                        <span id="userName" class="text-sm font-medium text-gray-300">Admin</span>
                    </div>
                    <button id="logoutBtn" class="text-gray-500 hover:text-red-400 transition">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 overflow-y-auto bg-black">
            <div class="bg-gray-900 border-b border-gray-800 px-6 py-3 sticky top-0 z-10">
                <h2 class="text-lg font-semibold text-white" id="pageTitle">Dashboard</h2>
            </div>
            <div class="p-6">
                <div id="viewContainer">Carregando...</div>
            </div>
        </main>
    </div>

    <!-- Modal personalizado -->
    <div id="customModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center hidden z-50">
        <div class="bg-gray-900 rounded-2xl shadow-2xl w-full max-w-md p-6 border border-gray-800">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-xl font-bold text-white">Adicionar</h3>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-300 transition">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modalBody"></div>
            <div class="flex justify-end gap-2 mt-6">
                <button id="modalCancelBtn" class="px-4 py-2 border border-gray-700 rounded-xl text-gray-300 hover:bg-gray-800 transition">Cancelar</button>
                <button id="modalConfirmBtn" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Lightbox para imagens e vídeos -->
    <div id="lightbox" class="fixed inset-0 bg-black/90 flex items-center justify-center hidden z-50">
        <button id="closeLightbox" class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300 transition z-10">
            <i class="fas fa-times"></i>
        </button>
        <img id="lightboxImage" src="" alt="Visualização" class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl" style="display:none;">
        <div id="lightboxVideoContainer" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl" style="display:none;"></div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
