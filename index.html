<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TV Cast · Receptor de Mídia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, 'Inter', 'Poppins', -apple-system, 'Roboto', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: rgba(15, 25, 45, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            padding: 30px 28px;
            transition: all 0.2s ease;
        }

        .tv-mode {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 85vh;
        }

        .tv-code-box {
            background: #000000aa;
            backdrop-filter: blur(20px);
            padding: 40px 55px;
            border-radius: 80px;
            margin: 30px 0;
            border: 2px solid #ffd966;
            box-shadow: 0 0 30px rgba(255, 220, 100, 0.4);
        }

        .code-digit {
            font-size: 6rem;
            font-weight: 800;
            letter-spacing: 18px;
            font-family: 'Courier New', 'Fira Mono', monospace;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .tv-status {
            font-size: 1.4rem;
            color: #b9fbc0;
            font-weight: 500;
            background: #1e2a3a70;
            padding: 10px 24px;
            border-radius: 60px;
            display: inline-block;
            margin-top: 15px;
        }

        .fixed-code-badge {
            background: #ffa23430;
            border: 1px solid #ffa234;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: inline-block;
        }

        .media-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
            max-height: 55vh;
            overflow-y: auto;
            padding-right: 8px;
        }

        .media-card {
            background: #0f1a24cc;
            border-radius: 32px;
            padding: 15px;
            border-left: 6px solid #ffb347;
        }

        .media-title {
            font-size: 0.9rem;
            color: #ffda99;
            word-break: break-word;
        }

        .media-viewer {
            margin-top: 12px;
            border-radius: 24px;
            overflow: hidden;
            background: #00000055;
        }

        .media-viewer img, 
        .media-viewer video {
            max-width: 100%;
            max-height: 280px;
            border-radius: 24px;
            display: block;
            margin: 0 auto;
        }

        .no-media {
            color: #aaa;
            text-align: center;
            padding: 40px;
            font-style: italic;
        }

        .disconnect-btn {
            background: #732c2c;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .disconnect-btn:hover {
            background: #ac3a3a;
        }

        @media (max-width: 780px) {
            .code-digit {
                font-size: 3.2rem;
                letter-spacing: 8px;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot"></div>

<script>
    // ============================================================
    // CÓDIGO FIXO E PERMANENTE - SEMPRE O MESMO "1234"
    // ============================================================
    const FIXED_CODE = "1234";  // <--- ALTERE AQUI PARA QUALQUER CÓDIGO DE 4 DÍGITOS QUE DESEJAR
    // ============================================================

    // Gerenciador de mídia (usando localStorage para persistência entre abas/recarregamentos)
    class PersistentMediaManager {
        constructor(code) {
            this.storageKey = `cast_media_${code}`;
            this.listeners = new Set();
            this.loadMedia();
        }
        
        loadMedia() {
            const stored = localStorage.getItem(this.storageKey);
            if(stored) {
                try {
                    this.mediaItems = JSON.parse(stored);
                } catch(e) { 
                    this.mediaItems = []; 
                }
            } else {
                this.mediaItems = [];
            }
        }
        
        saveMedia() {
            localStorage.setItem(this.storageKey, JSON.stringify(this.mediaItems));
            this.notifyListeners();
        }
        
        getMedia() {
            return [...this.mediaItems];
        }
        
        addMedia(mediaItem) {
            this.mediaItems.push(mediaItem);
            this.saveMedia();
            return true;
        }
        
        removeMedia(mediaId) {
            this.mediaItems = this.mediaItems.filter(m => m.id !== mediaId);
            this.saveMedia();
            return true;
        }
        
        clearAllMedia() {
            this.mediaItems = [];
            this.saveMedia();
        }
        
        subscribe(callback) {
            this.listeners.add(callback);
            return () => this.listeners.delete(callback);
        }
        
        notifyListeners() {
            this.listeners.forEach(cb => cb(this.getMedia()));
        }
        
        // Sincronizar com mudanças em outras abas
        startSync() {
            window.addEventListener('storage', (e) => {
                if(e.key === this.storageKey) {
                    this.loadMedia();
                    this.notifyListeners();
                }
            });
        }
    }

    // Instância única do gerenciador (código fixo)
    const mediaManager = new PersistentMediaManager(FIXED_CODE);
    mediaManager.startSync();

    const root = document.getElementById('appRoot');
    let tvUnsubscribe = null;

    // ==================== MODO TV ====================
    function initTVMode() {
        if(tvUnsubscribe) tvUnsubscribe();
        
        tvUnsubscribe = mediaManager.subscribe((mediaItems) => {
            renderTVMediaContent(mediaItems);
        });
        
        renderTVScreen();
    }

    function renderTVScreen() {
        const mediaItems = mediaManager.getMedia();
        root.innerHTML = `
            <div class="card tv-mode">
                <div>
                    <div class="fixed-code-badge">🔒 CÓDIGO DE PAREO</div>
                    <h2 style="color:#ffd9a5; margin-top: 5px;">📺 MODO TV</h2>
                    <p style="color:#bbccff; margin-bottom: 5px;">Use o código abaixo para conectar do seu PC ou celular</p>
                    <div class="tv-code-box">
                        <div class="code-digit">${FIXED_CODE}</div>
                    </div>
                    <p style="color:#b9c8ff; font-size:0.9rem;">Digite este código no seu dispositivo para enviar arquivos</p>
                    <p style="color:#88aadd; font-size:0.85rem; margin-top: 8px;">📱 Acesse o mesmo site no seu dispositivo e envie arquivos</p>
                    <div class="tv-status" id="tvStatusMsg">
                        ${mediaItems.length === 0 ? '📡 Aguardando mídia...' : `📥 ${mediaItems.length} mídia(s) recebida(s)`}
                    </div>
                    <button id="clearTvMediaBtn" class="disconnect-btn" style="background:#5a3a2e;">🗑️ Limpar todas as mídias</button>
                </div>
                <div style="margin-top: 40px; width:100%;">
                    <h3 style="color:#ffd27a;">📺 Transmissão ao vivo</h3>
                    <div id="tvMediaContainer" class="media-grid"></div>
                </div>
            </div>
        `;
        
        renderTVMediaContent(mediaItems);
        
        document.getElementById('clearTvMediaBtn')?.addEventListener('click', () => {
            if(confirm('Tem certeza que deseja LIMPAR TODAS as mídias da TV?')) {
                mediaManager.clearAllMedia();
            }
        });
    }

    function renderTVMediaContent(mediaItems) {
        const container = document.getElementById('tvMediaContainer');
        const statusSpan = document.getElementById('tvStatusMsg');
        
        if(!container) return;
        
        if(statusSpan) {
            statusSpan.innerHTML = mediaItems.length === 0 ? '📡 Aguardando mídia...' : `📥 ${mediaItems.length} mídia(s) recebida(s)`;
        }
        
        if(mediaItems.length === 0) {
            container.innerHTML = `<div class="no-media">✨ Nenhuma mídia enviada ainda.<br><br>📱 <strong>Como enviar:</strong><br>1. Abra o mesmo site no seu PC ou celular<br>2. Digite o código <strong style="color:#ffb347;">${FIXED_CODE}</strong><br>3. Envie fotos e vídeos para a TV</div>`;
            return;
        }
        
        container.innerHTML = mediaItems.map(item => `
            <div class="media-card">
                <div class="media-title">📄 ${escapeHtml(item.name)} (${item.type?.split('/')[0] || 'arquivo'})</div>
                <div class="media-viewer">
                    ${item.type?.startsWith('image/') ? `<img src="${item.dataURL}" alt="imagem" style="max-width:100%; border-radius:24px;">` : 
                      item.type?.startsWith('video/') ? `<video controls src="${item.dataURL}" style="max-width:100%; max-height:280px; border-radius:24px;"></video>` : 
                      `<div style="padding:20px; background:#1f2a36;">📁 ${escapeHtml(item.name)} (arquivo não visualizável diretamente)</div>`}
                </div>
            </div>
        `).join('');
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // Inicializar a TV diretamente
    initTVMode();
</script>
</body>
</html>
